--------------------------------------------------------------------------- */
let cmdkSelIndex = 0;
async function openCommandPalette() {
  const overlay = $('#cmdk-overlay');
  overlay.classList.add('open');
  $('#cmdk-input').value = '';
  $('#cmdk-input').focus();
  cmdkSelIndex = 0;
  await renderCommandResults('');
}
function closeCommandPalette() { $('#cmdk-overlay').classList.remove('open'); }

async function renderCommandResults(query) {
  const resultsEl = $('#cmdk-results');
  const q = query.trim().toLowerCase();
  const [articles, documents, reports] = await Promise.all([getActiveArticles(), getActiveDocuments(), getActiveReports()]);
  let items = [
    ...articles.map(a => ({ type: 'article', title: a.title, sub: truncate((a.summary || a.content || '').replace(/[#*\[\]]/g, ''), 70), item: a })),
    ...documents.map(d => ({ type: 'document', title: d.title, sub: d.processed ? 'Documento procesado' : 'Documento pendiente', item: d })),
    ...reports.map(r => ({ type: 'report', title: r.query, sub: `Informe · ${r.articleCount} artículos`, item: r })),
  ];
  if (q) {
    items = items.filter(it => it.title.toLowerCase().includes(q) || (it.type === 'article' && (it.item.content || '').toLowerCase().includes(q)) || (it.type === 'document' && (it.item.text || '').toLowerCase().includes(q)));
  }
  items = items.slice(0, 30);
  resultsEl.innerHTML = '';
  if (!items.length) { resultsEl.appendChild(el('div', { class: 'cmdk-empty' }, q ? `Sin resultados para "${query}"` : 'Escribe para buscar en artículos, documentos e informes…')); return; }
  items.forEach((it, i) => {
    const icon = it.type === 'article' ? 'article' : it.type === 'document' ? 'doc' : 'research';
    const row = el('div', { class: `cmdk-item ${i === cmdkSelIndex ? 'sel' : ''}`, onclick: () => activateCommandItem(it) }, [
      el('div', { class: 'item-icon', html: ICONS[icon] }),
      el('div', {}, [el('div', {}, it.title), el('div', { style: 'font-size:11.5px;color:var(--text-muted)' }, it.sub)]),
    ]);
    resultsEl.appendChild(row);
  });
  resultsEl._items = items;
}
function activateCommandItem(it) {
  closeCommandPalette();
  if (it.type === 'article') openArticleModal(it.item);
  else if (it.type === 'document') openDocumentModal(it.item);
  else openReportModal(it.item);
}
document.addEventListener('keydown', (e) => {
  const cmdk = $('#cmdk-overlay');
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); cmdk?.classList.contains('open') ? closeCommandPalette() : openCommandPalette(); return; }
  if (!cmdk || !cmdk.classList.contains('open')) return;
  if (e.key === 'Escape') { closeCommandPalette(); return; }
  const items = $('#cmdk-results')._items || [];
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdkSelIndex = Math.min(items.length - 1, cmdkSelIndex + 1); renderCommandResults($('#cmdk-input').value); }
  if (e.key === 'ArrowUp') { e.preventDefault(); cmdkSelIndex = Math.max(0, cmdkSelIndex - 1); renderCommandResults($('#cmdk-input').value); }
  if (e.key === 'Enter') { e.preventDefault(); if (items[cmdkSelIndex]) activateCommandItem(items[cmdkSelIndex]); }
});
document.addEventListener('DOMContentLoaded', () => {
  $('#cmdk-input')?.addEventListener('input', debounce((e) => { cmdkSelIndex = 0; renderCommandResults(e.target.value); }, 120));
  $('#cmdk-overlay')?.addEventListener('click', (e) => { if (e.target.id === 'cmdk-overlay') closeCommandPalette(); });
});

async function handleFiles(files) {
  if (!files.length) return;
  const progressToast = files.length > 1 ? toast(`Importando ${files.length} archivo(s)…`, 'info', 3500) : null;
  let ok = 0, fail = 0;
  for (const file of files) {
    try {
      const text = await extractTextFromFile(file);
      if (!text || text.trim().length < 20) { fail++; continue; }
      await addDocument({ title: file.name.replace(/\.(pdf|md|txt|markdown)$/i, ''), text, sourceType: 'upload' });
      ok++;
    } catch (e) { fail++; }
  }
  toast(`${ok} archivo(s) añadido(s)${fail ? ` · ${fail} con errores` : ''}.`, fail && !ok ? 'error' : 'success');
  await refreshSidebar();
  renderBibliotecaView();
}

async function addNoteFromTextarea() {
  const text = $('#note-text').value.trim();

  const title = $('#note-title').value.trim() || truncate(text.split('\n')[0], 60) || 'Nota rápida';

  renderGraphSVG(graphContainer, data, {
    width: width || 900, height: height || 500, interactive: true, mode: 'select', colorByCluster: grafoIslandMode,
    onNodeSelect: async (node, neighborIds) => {
      if (!node) { sidePanel.style.display = 'none'; return; }
      const article = await dbGet('articles', node.id);
      sidePanel.style.display = 'block';

      sidePanel.appendChild(el('button', { class: 'btn btn-sm btn-primary btn-block', onclick: () => openArticleModal(article) }, 'Abrir artículo'));
    },
  });

  if (!grafoIslandMode) {
    graphContainer.insertBefore(el('div', { class: 'graph-legend', style: 'position:absolute;bottom:10px;left:14px' }, [
      el('span', {}, [el('span', { class: 'legend-dot', style: 'background:#d4a24c' }), 'Conectado']),
      el('span', {}, [el('span', { class: 'legend-dot', style: 'background:#5ba39f' }), 'Sin conexiones']),
    ]), graphContainer.firstChild);
  }

  $('#grafo-tag-select')?.addEventListener('change', (e) => { grafoTagFilter = e.target.value || null; renderGrafoView(); });
}

/* ---------------------------------------------------------------------------
   23. VISTA: LINT (salud de la wiki) con fusión de duplicados (#2, #11)
--------------------------------------------------------------------------- */
function lintItemText(i) {
  if (i === null || i === undefined) return '';
  if (typeof i === 'string' || typeof i === 'number') return String(i);
  if (typeof i === 'object') {
    // formas habituales que devuelven los modelos para "missing_data"/"suggestions"
    const candidate = i.text || i.description || i.suggestion || i.issue || i.article || i.title || i.name;
    if (candidate) return String(candidate);
    try { return JSON.stringify(i); } catch { return String(i); }
  }
  return String(i);
}
function synonymLabel(s) { return `${lintItemText(s.name1 ?? s.title1 ?? '')} ↔ ${lintItemText(s.name2 ?? s.title2 ?? '')}`; }

async function renderLintView() {
  const root = $('#view-lint'); root.innerHTML = '';
  root.appendChild(el('div', { class: 'card', style: 'display:flex;justify-content:space-between;align-items:center' }, [
    el('div', {}, [el('strong', {}, 'Análisis de integridad'), el('p', { class: 'hint' }, 'La IA revisa enlaces rotos entre artículos, posibles duplicados y contenido incompleto.')]),
    el('button', { class: 'btn btn-primary', id: 'lint-btn' }, [el('span', { html: ICONS.play }), 'Analizar wiki']),
  ]));
  const resultRoot = el('div', { id: 'lint-result', style: 'margin-top:18px' });
  root.appendChild(resultRoot);

  $('#lint-btn').addEventListener('click', async () => {
    if (!Settings.getApiKey()) { showOnboarding(); return; }
    $('#lint-btn').disabled = true;
    resultRoot.innerHTML = '';
    resultRoot.appendChild(el('div', { class: 'loading-row' }, [el('div', { class: 'spinner' }), 'Analizando la estructura de la wiki…']));
    try {
      const { report, raw, articles } = await lintWiki();
      resultRoot.innerHTML = '';
      if (report) { resultRoot.appendChild(el('div', { class: 'empty-state' }, [el('h3', {}, report)])); return; }

      // Sinónimos con acción de fusión
      const synonymsBox = el('div', { class: 'card' }, [
        el('span', { class: 'eyebrow' }, `🔄 Posibles duplicados (${(raw.synonyms || []).length})`),
      ]);
      if ((raw.synonyms || []).length) {
        if (raw.synonyms.length > 1) synonymsBox.appendChild(el('button', { class: 'btn btn-sm', style: 'margin:8px 0', onclick: async (e) => {
          if (!confirm(`¿Fusionar automáticamente los ${raw.synonyms.length} pares detectados? Se conservará el primer título de cada par.`)) return;
          e.target.disabled = true;
          for (const s of raw.synonyms) await mergePairByTitles(s.name1, s.name2, articles);
          toast('Duplicados fusionados.', 'success');
          await refreshSidebar();
          renderLintView();
        } }, [el('span', { html: ICONS.merge }), 'Fusionar todos automáticamente']));
        const list = el('div', { style: 'margin-top:6px' });
        raw.synonyms.forEach(s => list.appendChild(el('div', { class: 'item-row', style: 'cursor:default' }, [
          el('div', { class: 'item-main' }, synonymLabel(s)),
          el('button', { class: 'btn btn-sm', onclick: async (e) => { e.target.disabled = true; await mergePairByTitles(s.name1, s.name2, articles); toast('Artículos fusionados.', 'success'); await refreshSidebar(); renderLintView(); } }, [el('span', { html: ICONS.merge }), 'Fusionar']),
        ])));
        synonymsBox.appendChild(list);
      } else {
        synonymsBox.appendChild(el('p', { class: 'hint', style: 'margin-top:8px' }, 'Nada que reportar.'));
      }

      const sections = [
        { key: 'broken_links', label: '🔗 Enlaces rotos', render: i => typeof i === 'string' ? i : `${i.file || i.article || ''} → [[${i.missing_link || i.link || ''}]]` },
        { key: 'missing_data', label: '⚠️ Contenido incompleto', render: lintItemText },
        { key: 'suggestions', label: '💡 Sugerencias', render: lintItemText },
      ];
      const grid = el('div', { class: 'grid grid-2' }, [synonymsBox]);
      sections.forEach(s => {
        const items = raw[s.key] || [];
        grid.appendChild(el('div', { class: 'card' }, [
          el('span', { class: 'eyebrow' }, `${s.label} (${items.length})`),
          items.length
            ? el('ul', { style: 'margin-top:8px;padding-left:18px;font-size:13px;color:var(--text-dim)' }, items.map(i => el('li', { style: 'margin:4px 0' }, s.render(i))))
            : el('p', { class: 'hint', style: 'margin-top:8px' }, 'Nada que reportar.'),
        ]));
      });
      resultRoot.appendChild(grid);
    } catch (e) { resultRoot.innerHTML = ''; resultRoot.appendChild(el('div', { class: 'card', style: 'border-color:var(--danger)' }, `Error: ${e.message}`)); }
    finally { $('#lint-btn').disabled = false; }
  });
}
async function mergePairByTitles(title1, title2, articles) {
  const t1 = lintItemText(title1).toLowerCase();
  const t2 = lintItemText(title2).toLowerCase();
  if (!t1 || !t2) { toast('No se pudo identificar el par de artículos a fusionar.', 'error'); return; }
  const a = articles.find(x => x.title.toLowerCase() === t1);
  const b = articles.find(x => x.title.toLowerCase() === t2);
  if (a && b && a.id !== b.id) await mergeArticles(a.id, b.id);
  else toast('No se encontraron ambos artículos para fusionar (puede que ya se hayan fusionado).', 'error');
}

--------------------------------------------------------------------------- */
async function renderPapeleraView() {
  const root = $('#view-papelera'); root.innerHTML = '';
  const items = await getTrashItems();

  root.appendChild(el('div', { class: 'btn-row', style: 'justify-content:space-between;margin-bottom:16px' }, [
    el('span', { class: 'hint' }, 'Los elementos eliminados se guardan aquí hasta que los borres definitivamente.'),
    items.length ? el('button', { class: 'btn btn-sm btn-danger btn-ghost', onclick: async () => {
      if (!confirm('¿Vaciar la papelera? Esta acción no se puede deshacer.')) return;
      await emptyTrash(); toast('Papelera vaciada.', 'info'); refreshSidebar(); renderPapeleraView();
    } }, 'Vaciar papelera') : null,
  ]));

  if (!items.length) { root.appendChild(el('div', { class: 'empty-state' }, [el('h3', {}, 'La papelera está vacía'), el('p', {}, 'Los artículos, documentos e informes que elimines aparecerán aquí.')])); return; }

  const restoreFns = { articles: restoreArticle, documents: restoreDocument, reports: restoreReport };
  items.forEach(t => {
    const icon = t.type === 'article' ? 'article' : t.type === 'document' ? 'doc' : 'research';
    const title = t.type === 'report' ? t.item.query : t.item.title;
    root.appendChild(el('div', { class: 'item-row trash-row', style: 'cursor:default' }, [
      el('div', { class: 'item-icon', html: ICONS[icon] }),
      el('div', { class: 'item-main' }, [el('div', { class: 'item-title' }, title), el('div', { class: 'item-sub' }, `Eliminado el ${fmtDate(t.item.deletedAt)}`)]),
      el('div', { class: 'btn-row' }, [
        el('button', { class: 'btn btn-sm', onclick: async () => { await restoreFns[t.store](t.item.id); toast('Restaurado.', 'success'); refreshSidebar(); renderPapeleraView(); } }, [el('span', { html: ICONS.restore }), 'Restaurar']),
        el('button', { class: 'btn btn-sm btn-ghost btn-danger', onclick: async () => { if (confirm('¿Borrar definitivamente? No se puede deshacer.')) { await purgeItem(t.store, t.item.id); refreshSidebar(); renderPapeleraView(); } } }, [el('span', { html: ICONS.trash })]),
      ]),
    ]));
  });
}
