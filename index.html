<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segundo Cerebro · Base de conocimiento con IA</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='30' cy='35' r='7' fill='%23d4a24c'/%3E%3Ccircle cx='68' cy='28' r='7' fill='%235ba39f'/%3E%3Ccircle cx='72' cy='68' r='7' fill='%23d4a24c'/%3E%3Ccircle cx='28' cy='70' r='7' fill='%235ba39f'/%3E%3Cline x1='30' y1='35' x2='68' y2='28' stroke='%23e8e6de' stroke-width='2'/%3E%3Cline x1='68' y1='28' x2='72' y2='68' stroke='%23e8e6de' stroke-width='2'/%3E%3Cline x1='72' y1='68' x2='28' y2='70' stroke='%23e8e6de' stroke-width='2'/%3E%3Cline x1='28' y1='70' x2='30' y2='35' stroke='%23e8e6de' stroke-width='2'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root[data-theme="light"]{
  --bg:#f5f2ea;
  --bg-elevated:#ffffff;
  --bg-card:#ffffff;
  --bg-card-hover:#f1ede2;
  --border:#ddd6c4;
  --border-soft:#e7e1d2;
  --text:#241f14;
  --text-dim:#463f2c;
  --text-muted:#83795e;
  --accent:#b9812f;
  --accent-soft:rgba(185,129,47,.13);
  --accent-2:#3d7d78;
  --accent-2-soft:rgba(61,125,120,.13);
  --shadow:0 8px 30px rgba(80,60,20,.14);
}
:root{
  --bg:#12141a;
  --bg-elevated:#181b23;
  --bg-card:#1e222c;
  --bg-card-hover:#252a36;
  --border:#2b303c;
  --border-soft:#22262f;
  --text:#eae7de;
  --text-dim:#c9c6ba;
  --text-muted:#8b8f9e;
  --accent:#d4a24c;
  --accent-soft:rgba(212,162,76,.14);
  --accent-2:#5ba39f;
  --accent-2-soft:rgba(91,163,159,.14);
  --danger:#d1685a;
  --danger-soft:rgba(209,104,90,.14);
  --success:#7fae72;
  --success-soft:rgba(127,174,114,.14);
  --radius:10px;
  --radius-sm:6px;
  --font-display:'Fraunces',serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --sidebar-w:252px;
  --shadow:0 8px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{color-scheme:dark;}
html[data-theme="light"]{color-scheme:light;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:14.5px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  height:100vh;
}
::selection{background:var(--accent-soft);color:var(--text);}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#333947;border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:#3f4658;}
a{color:var(--accent-2);}
button{font-family:inherit;cursor:pointer;}
:focus-visible{outline:2px solid var(--accent-2);outline-offset:2px;}

/* ---------- App shell ---------- */
#app{display:flex;height:100vh;width:100vw;}

/* ---------- Sidebar ---------- */
.sidebar{
  width:var(--sidebar-w);flex:0 0 auto;
  background:var(--bg-elevated);
  border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;
  padding:20px 14px;
  height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;}
.brand canvas{width:34px;height:34px;flex:0 0 auto;}
.brand-text{display:flex;flex-direction:column;line-height:1.15;}
.brand-title{font-family:var(--font-display);font-weight:600;font-size:17px;letter-spacing:.2px;}
.brand-sub{font-size:10.5px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:.4px;text-transform:uppercase;}

.nav{display:flex;flex-direction:column;gap:2px;margin-top:6px;}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 12px;border-radius:var(--radius-sm);
  color:var(--text-dim);background:transparent;border:none;
  font-size:13.5px;font-weight:500;text-align:left;width:100%;
  transition:background .12s,color .12s;
}
.nav-item svg{flex:0 0 auto;opacity:.85;}
.nav-item:hover{background:var(--bg-card);color:var(--text);}
.nav-item.active{background:var(--accent-soft);color:var(--accent);}
.nav-item.active svg{opacity:1;}
.nav-item .count{
  margin-left:auto;font-family:var(--font-mono);font-size:10.5px;
  color:var(--text-muted);background:var(--bg-card);
  padding:1px 6px;border-radius:20px;
}
.nav-item.active .count{color:var(--accent);}
.nav-divider{height:1px;background:var(--border-soft);margin:12px 4px;}

.sidebar-graph{
  margin-top:auto;border-top:1px solid var(--border-soft);padding-top:14px;
}
.sidebar-graph-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px;display:flex;justify-content:space-between;}
.sidebar-graph canvas{width:100%;height:96px;border-radius:var(--radius-sm);background:var(--bg);display:block;cursor:pointer;}
.sidebar-status{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;color:var(--text-muted);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex:0 0 auto;}
.status-dot.off{background:var(--danger);}

/* ---------- Main ---------- */
.main{flex:1 1 auto;display:flex;flex-direction:column;height:100vh;min-width:0;}
.topbar{
  display:flex;align-items:center;gap:14px;
  padding:16px 28px;border-bottom:1px solid var(--border-soft);
  flex:0 0 auto;background:var(--bg);
}
.topbar h1{font-family:var(--font-display);font-size:21px;font-weight:600;}
.topbar-sub{font-size:12.5px;color:var(--text-muted);margin-top:1px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.model-select{
  background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);
  font-family:var(--font-mono);font-size:11.5px;padding:6px 10px;border-radius:var(--radius-sm);
}
.view-scroll{flex:1 1 auto;overflow-y:auto;padding:26px 28px 60px;}
.view{display:none;}
.view.active{display:block;animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* ---------- Generic components ---------- */
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}

.card{
  background:var(--bg-card);border:1px solid var(--border-soft);
  border-radius:var(--radius);padding:18px;
}
.stat-card{display:flex;flex-direction:column;gap:6px;}
.stat-num{font-family:var(--font-display);font-size:32px;font-weight:600;color:var(--text);}
.stat-label{font-size:11.5px;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.4px;}
.stat-accent .stat-num{color:var(--accent);}
.stat-accent2 .stat-num{color:var(--accent-2);}

.section-title{font-family:var(--font-display);font-size:18px;font-weight:600;margin:28px 0 14px;display:flex;align-items:center;gap:8px;}
.section-title:first-child{margin-top:0;}
.eyebrow{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--accent-2);margin-bottom:6px;display:block;}

.btn{
  display:inline-flex;align-items:center;gap:7px;justify-content:center;
  padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);font-size:13px;font-weight:500;
  transition:.12s;white-space:nowrap;
}
.btn:hover{background:var(--bg-card-hover);border-color:#3a4050;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#1b1408;font-weight:600;}
.btn-primary:hover{background:#e0ad57;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-muted);}
.btn-ghost:hover{background:var(--bg-card);color:var(--text);}
.btn-danger{color:var(--danger);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-block{width:100%;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

input[type=text],input[type=password],input[type=number],textarea,select{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  padding:9px 12px;border-radius:var(--radius-sm);font-family:inherit;font-size:13.5px;width:100%;
}
textarea{resize:vertical;line-height:1.5;}
input:focus,textarea:focus,select:focus{border-color:var(--accent-2);}
label.field-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block;font-weight:500;}
.field{margin-bottom:14px;}
.hint{font-size:11.5px;color:var(--text-muted);margin-top:5px;}

.badge{
  display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);
  font-size:10.5px;padding:2px 8px;border-radius:20px;background:var(--bg);
  border:1px solid var(--border);color:var(--text-muted);
}
.badge-accent{background:var(--accent-soft);color:var(--accent);border-color:transparent;}
.badge-accent2{background:var(--accent-2-soft);color:var(--accent-2);border-color:transparent;}
.badge-success{background:var(--success-soft);color:var(--success);border-color:transparent;}
.badge-danger{background:var(--danger-soft);color:var(--danger);border-color:transparent;}

.tag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--text-dim);}

.empty-state{
  text-align:center;padding:50px 20px;color:var(--text-muted);
  border:1px dashed var(--border);border-radius:var(--radius);
}
.empty-state svg{opacity:.5;margin-bottom:10px;}
.empty-state h3{font-family:var(--font-display);color:var(--text-dim);font-size:16px;margin-bottom:6px;font-weight:600;}
.empty-state p{font-size:13px;max-width:360px;margin:0 auto;}

.spinner{
  width:15px;height:15px;border-radius:50%;
  border:2px solid rgba(255,255,255,.18);border-top-color:currentColor;
  animation:spin .7s linear infinite;flex:0 0 auto;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:13px;padding:14px 0;}

/* Article / doc list */
.item-row{
  display:flex;align-items:flex-start;gap:12px;padding:13px 14px;
  border:1px solid var(--border-soft);border-radius:var(--radius-sm);
  background:var(--bg-card);margin-bottom:8px;cursor:pointer;transition:.12s;
}
.item-row:hover{background:var(--bg-card-hover);border-color:var(--border);}
.item-icon{flex:0 0 auto;width:32px;height:32px;border-radius:8px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;}
.item-icon.doc{background:var(--accent-2-soft);color:var(--accent-2);}
.item-main{flex:1 1 auto;min-width:0;}
.item-title{font-weight:600;font-size:13.7px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-sub{font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.item-meta{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.search-box{position:relative;flex:1 1 260px;}
.search-box input{padding-left:34px;}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.5;}

.dropzone{
  border:1.5px dashed var(--border);border-radius:var(--radius);
  padding:30px 20px;text-align:center;color:var(--text-muted);
  transition:.15s;cursor:pointer;background:var(--bg-card);
}
.dropzone.drag{border-color:var(--accent-2);background:var(--accent-2-soft);color:var(--text);}
.dropzone svg{margin-bottom:8px;opacity:.6;}
.dropzone strong{color:var(--accent-2);}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(8,9,12,.72);backdrop-filter:blur(2px);
  display:none;align-items:flex-start;justify-content:center;z-index:200;padding:5vh 20px;overflow-y:auto;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:720px;box-shadow:var(--shadow);max-height:90vh;display:flex;flex-direction:column;
}
.modal-header{display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid var(--border-soft);}
.modal-header h2{font-family:var(--font-display);font-size:18px;font-weight:600;flex:1;}
.modal-body{padding:22px;overflow-y:auto;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border-soft);display:flex;justify-content:flex-end;gap:8px;}
.modal-close{background:transparent;border:none;color:var(--text-muted);padding:4px;border-radius:6px;}
.modal-close:hover{background:var(--bg-card);color:var(--text);}

/* Markdown render */
.md h1,.md h2,.md h3{font-family:var(--font-display);font-weight:600;margin:18px 0 8px;}
.md h1{font-size:21px;}.md h2{font-size:18px;}.md h3{font-size:15.5px;}
.md p{margin:9px 0;color:var(--text-dim);}
.md ul,.md ol{margin:9px 0 9px 22px;color:var(--text-dim);}
.md li{margin:3px 0;}
.md strong{color:var(--text);font-weight:600;}
.md code{background:var(--bg);padding:1px 5px;border-radius:4px;font-family:var(--font-mono);font-size:.9em;color:var(--accent-2);}
.md pre{background:var(--bg);padding:12px 14px;border-radius:8px;overflow-x:auto;margin:10px 0;}
.md a.wikilink{
  color:var(--accent);border-bottom:1px dotted var(--accent);text-decoration:none;cursor:pointer;font-weight:500;
}
.md a.wikilink:hover{color:var(--accent-2);border-color:var(--accent-2);}
.md hr{border:none;border-top:1px solid var(--border-soft);margin:16px 0;}
.md blockquote{border-left:3px solid var(--accent-2);padding-left:12px;color:var(--text-muted);margin:10px 0;}

/* Toasts */
#toast-container{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:400;}
.toast{
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:11px 16px;font-size:13px;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;
  max-width:340px;animation:toastin .2s ease;
}
@keyframes toastin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.toast.success{border-left:3px solid var(--success);}
.toast.error{border-left:3px solid var(--danger);}
.toast.info{border-left:3px solid var(--accent-2);}

/* Onboarding */
#onboarding{
  position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.onboard-card{max-width:460px;width:100%;text-align:left;}
.onboard-logo{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
.onboard-logo canvas{width:44px;height:44px;}
.onboard-card h1{font-family:var(--font-display);font-size:26px;font-weight:600;margin-bottom:8px;}
.onboard-card p{color:var(--text-muted);font-size:13.5px;margin-bottom:22px;line-height:1.6;}

/* Progress / log stream */
.log-stream{
  background:var(--bg);border:1px solid var(--border-soft);border-radius:var(--radius-sm);
  padding:14px 16px;max-height:280px;overflow-y:auto;font-family:var(--font-mono);font-size:12px;
  display:flex;flex-direction:column;gap:6px;
}
.log-line{color:var(--text-muted);display:flex;gap:8px;}
.log-line .t{color:var(--text-muted);opacity:.6;flex:0 0 auto;}
.log-line.ok{color:var(--success);}
.log-line.warn{color:var(--accent);}
.log-line.err{color:var(--danger);}
.log-line.head{color:var(--accent-2);font-weight:600;}

.progress-bar{height:5px;border-radius:4px;background:var(--bg);overflow:hidden;margin:10px 0;}
.progress-bar-fill{height:100%;background:var(--accent-2);transition:width .3s;}

.paper-card{border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:9px;background:var(--bg-card);}
.paper-card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;}
.paper-title{font-weight:600;font-size:13.7px;line-height:1.4;}
.paper-meta{font-size:11.5px;color:var(--text-muted);margin:5px 0 8px;}
.paper-score{font-family:var(--font-mono);font-size:15px;font-weight:600;flex:0 0 auto;}
.paper-abstract{font-size:12.5px;color:var(--text-dim);margin:6px 0;}
.paper-actions{display:flex;gap:8px;margin-top:9px;}

.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim);}
.checkbox-row input{width:auto;}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border-soft);margin-bottom:18px;}
.tab-btn{padding:9px 14px;background:none;border:none;color:var(--text-muted);font-size:13px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn.active{color:var(--accent);border-color:var(--accent);}

.kv-list{display:flex;flex-direction:column;gap:6px;font-size:12.5px;}
.kv-list div{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border-soft);}
.kv-list span:last-child{color:var(--text-muted);font-family:var(--font-mono);}

/* ---------- Etiquetas editables ---------- */
.tag-pill{
  display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px 3px 10px;
  border-radius:20px;background:var(--accent-2-soft);color:var(--accent-2);border:1px solid transparent;
}
.tag-pill button{background:none;border:none;color:inherit;opacity:.6;padding:0;font-size:12px;line-height:1;}
.tag-pill button:hover{opacity:1;}
.tag-input-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.tag-input-row input{width:auto;flex:1 1 120px;min-width:100px;padding:4px 8px;font-size:12px;}
.tag-filter-chip{
  font-size:11.5px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text-muted);cursor:pointer;
}
.tag-filter-chip.active{background:var(--accent-soft);color:var(--accent);border-color:transparent;font-weight:600;}

/* ---------- Toggle de tema ---------- */
.theme-toggle{
  display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:20px;padding:4px;cursor:pointer;
}
.theme-toggle button{
  border:none;background:none;color:var(--text-muted);padding:4px 8px;border-radius:16px;display:flex;align-items:center;
}
.theme-toggle button.active{background:var(--accent-soft);color:var(--accent);}

/* ---------- Paleta de comandos (Ctrl/Cmd+K) ---------- */
.cmdk-overlay{
  position:fixed;inset:0;background:rgba(8,9,12,.6);backdrop-filter:blur(2px);
  display:none;align-items:flex-start;justify-content:center;z-index:300;padding-top:12vh;
}
.cmdk-overlay.open{display:flex;}
.cmdk-box{
  width:100%;max-width:560px;background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:12px;box-shadow:var(--shadow);overflow:hidden;
}
.cmdk-input{
  width:100%;border:none;border-bottom:1px solid var(--border-soft);background:transparent;
  padding:16px 18px;font-size:15px;color:var(--text);
}
.cmdk-input:focus{outline:none;}
.cmdk-results{max-height:50vh;overflow-y:auto;padding:8px;}
.cmdk-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;
}
.cmdk-item:hover,.cmdk-item.sel{background:var(--bg-card);}
.cmdk-item .item-icon{width:26px;height:26px;}
.cmdk-empty{padding:24px;text-align:center;color:var(--text-muted);font-size:13px;}
.cmdk-hint{padding:9px 16px;border-top:1px solid var(--border-soft);font-size:11px;color:var(--text-muted);font-family:var(--font-mono);}

/* ---------- Grafo: panel lateral de nodo seleccionado ---------- */
.graph-wrap{position:relative;}
.graph-side-panel{
  position:absolute;top:14px;right:14px;width:230px;background:var(--bg-elevated);

/* ============================================================================
   SEGUNDO CEREBRO — Base de conocimiento con orquestación multi-agente
   Puerto 100% cliente (sin backend) del notebook original de Google Colab.
   Stack: vanilla JS, OpenAI API desde el navegador, IndexedDB, pdf.js.

/* ---------------------------------------------------------------------------
   0. UTILIDADES GENERALES
--------------------------------------------------------------------------- */
const $ = (sel, el = document) => el.querySelector(sel);
const $$ = (sel, el = document) => Array.from(el.querySelectorAll(sel));
const el = (tag, attrs = {}, children = []) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v !== undefined && v !== null) n.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c === null || c === undefined) return;
    if (c instanceof Node) { n.appendChild(c); return; }
    if (typeof c === 'string' || typeof c === 'number') { n.appendChild(document.createTextNode(String(c))); return; }
    // Salvaguarda: si algo (p. ej. una respuesta de la IA mal formada) cuela un
    // objeto/array en vez de un Node o string, lo mostramos como texto en vez
    // de romper toda la vista con "appendChild: parameter 1 is not of type Node".
    try { n.appendChild(document.createTextNode(typeof c === 'object' ? JSON.stringify(c) : String(c))); }
    catch { /* ignorar hijos irrepresentables */ }
  });
  return n;
};
const esc = s => (s || '').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
const fmtDate = (d) => {
  const dt = typeof d === 'number' ? new Date(d) : new Date(d);
  return dt.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
};
const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };
const slugify = s => (s || '').replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_').slice(0, 80);
const truncate = (s, n) => (s && s.length > n) ? s.slice(0, n) + '…' : (s || '');

function toast(msg, type = 'info', ms = 4200) {
  const c = $('#toast-container');
  const icon = { success: '✓', error: '⚠', info: 'ℹ' }[type] || 'ℹ';
  const t = el('div', { class: `toast ${type}` }, [el('span', {}, icon), el('span', {}, msg)]);
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = '.25s'; setTimeout(() => t.remove(), 260); }, ms);
}

function openModal(title, bodyNode, footerNodes = []) {

$('#modal-close-btn')?.addEventListener?.('click', closeModal);

/* ---------------------------------------------------------------------------
   1. CAPA DE PERSISTENCIA — IndexedDB
   Sustituye a Google Drive del notebook original. Todo vive en el navegador.
--------------------------------------------------------------------------- */
const DB_NAME = 'segundo_cerebro_db';
const DB_VERSION = 2;
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('documents')) db.createObjectStore('documents', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('articles')) db.createObjectStore('articles', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('curationSeen')) db.createObjectStore('curationSeen', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('curationLog')) db.createObjectStore('curationLog', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('reports')) db.createObjectStore('reports', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('qaHistory')) db.createObjectStore('qaHistory', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv', { keyPath: 'key' });
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => reject(e.target.error);
  });
}
function tx(store, mode = 'readonly') { return _db.transaction(store, mode).objectStore(store); }
async function dbGetAll(store) {
  await openDB();
  return new Promise((res, rej) => { const r = tx(store).getAll(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
}
async function dbGet(store, key) {
  await openDB();
  return new Promise((res, rej) => { const r = tx(store).get(key); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
}
async function dbPut(store, value) {
  await openDB();
  return new Promise((res, rej) => { const r = tx(store, 'readwrite').put(value); r.onsuccess = () => res(value); r.onerror = () => rej(r.error); });
}
async function dbDelete(store, key) {
  await openDB();
  return new Promise((res, rej) => { const r = tx(store, 'readwrite').delete(key); r.onsuccess = () => res(); r.onerror = () => rej(r.error); });
}
async function dbClear(store) {
  await openDB();
  return new Promise((res, rej) => { const r = tx(store, 'readwrite').clear(); r.onsuccess = () => res(); r.onerror = () => rej(r.error); });
}
async function kvGet(key, def = null) { const v = await dbGet('kv', key); return v ? v.value : def; }
async function kvSet(key, value) { return dbPut('kv', { key, value }); }

/* ---------------------------------------------------------------------------
   2. AJUSTES — API key, modelo, perfil de intereses
--------------------------------------------------------------------------- */
const Settings = {
  getApiKey() { return localStorage.getItem('ia_openai_key') || ''; },
  setApiKey(k) { localStorage.setItem('ia_openai_key', k || ''); },
  getModel() { return localStorage.getItem('sb_model') || 'gpt-4o-mini'; },
  setModel(m) { localStorage.setItem('sb_model', m); },
  getFrontierModel() { return localStorage.getItem('sb_frontier_model') || 'gpt-4o-mini'; },
  setFrontierModel(m) { localStorage.setItem('sb_frontier_model', m); },
  getTheme() { return localStorage.getItem('sb_theme') || 'dark'; },
  setTheme(t) { localStorage.setItem('sb_theme', t); document.documentElement.setAttribute('data-theme', t); },
  async getInterestProfile() {
    return (await kvGet('interest_profile')) || DEFAULT_INTEREST_PROFILE;
  },
  async setInterestProfile(v) { return kvSet('interest_profile', v); },
};

const DEFAULT_INTEREST_PROFILE = `Temas de ALTO interés (máxima prioridad):
- Agentes LLM, sistemas multi-agente, orquestación de agentes
- Ingeniería de prompts, in-context learning, chain-of-thought
- RAG (Retrieval-Augmented Generation), búsqueda semántica, embeddings
- Gestión del conocimiento personal (PKM), grafos de conocimiento
- Herramientas educativas con IA en educación superior

Temas de INTERÉS MEDIO:
- Evaluación y benchmarks de modelos de lenguaje
- Fine-tuning, PEFT, LoRA
- IA aplicada a medicina y ciencias de la salud

Temas de BAJO INTERÉS (filtrar salvo novedad muy alta):
- Finanzas, marketing, entretenimiento`;

/* ---------------------------------------------------------------------------
   3. CLIENTE OPENAI (llamadas directas desde el navegador)
--------------------------------------------------------------------------- */
/* Reintentos con backoff exponencial para 429 / errores 5xx transitorios (#22) */
async function fetchWithRetry(url, opts, { maxRetries = 4 } = {}) {
  let lastErr;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    let res;
    try { res = await fetch(url, opts); }
    catch (e) { lastErr = e; await sleepBackoff(attempt); continue; }
    if (res.status === 429 || res.status >= 500) {
      lastErr = new Error(`HTTP ${res.status}`);
      const retryAfter = parseFloat(res.headers?.get?.('retry-after')) || null;
      await sleepBackoff(attempt, retryAfter);
      continue;
    }
    return res;
  }
  throw lastErr || new Error('Fallo tras reintentos');
}
function sleepBackoff(attempt, retryAfterSec = null) {
  const ms = retryAfterSec ? retryAfterSec * 1000 : Math.min(8000, 500 * Math.pow(2, attempt)) + Math.random() * 250;
  return new Promise(r => setTimeout(r, ms));
}
function estimateTokens(text) { return Math.ceil((text || '').length / 4); }

async function callLLM(systemPrompt, userPrompt, { json = false, model = null } = {}) {
  const apiKey = Settings.getApiKey();
  if (!apiKey) { showOnboarding(); throw new Error('Falta la clave de API de OpenAI.'); }
  const body = {
    model: model || Settings.getModel(),
    messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }],
  };
  if (json) body.response_format = { type: 'json_object' };
  const res = await fetchWithRetry('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const errTxt = await res.text().catch(() => '');
    throw new Error(`OpenAI ${res.status}: ${errTxt.slice(0, 200)}`);
  }
  const data = await res.json();
  return data.choices[0].message.content;
}
async function callLLMJSON(systemPrompt, userPrompt, opts = {}) {
  const raw = await callLLM(systemPrompt, userPrompt, { ...opts, json: true });
  try { return JSON.parse(raw); }
  catch (e) {
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
    throw new Error('Respuesta no era JSON válido: ' + raw.slice(0, 150));
  }
}
async function getEmbedding(text) {
  const apiKey = Settings.getApiKey();
  if (!apiKey) throw new Error('Falta la clave de API de OpenAI.');
  const res = await fetchWithRetry('https://api.openai.com/v1/embeddings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({ model: 'text-embedding-3-small', input: (text || '').slice(0, 8000) }),
  });
  if (!res.ok) throw new Error('Error obteniendo embedding: ' + res.status);
  const data = await res.json();
  return data.data[0].embedding;
}
function cosineSim(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-10);
}

/* ---------------------------------------------------------------------------
   4. RENDERIZADO MARKDOWN LIGERO (con soporte [[wikilinks]])
--------------------------------------------------------------------------- */
function markdownToHtml(md) {
  if (!md) return '';
  let s = esc(md);
  s = s.replace(/```([\s\S]*?)```/g, (m, c) => `<pre><code>${c}</code></pre>`);
  s = s.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.*)$/gm, '<h1>$1</h1>');
  s = s.replace(/^&gt; (.*)$/gm, '<blockquote>$1</blockquote>');
  s = s.replace(/^---$/gm, '<hr>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\[\[([^\]]+)\]\]/g, (m, title) => `<a class="wikilink" data-wikilink="${esc(title)}">${esc(title)}</a>`);
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // listas
  s = s.replace(/(^|\n)((?:- .*(?:\n|$))+)/g, (m, pre, block) => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
    return `${pre}<ul>${items}</ul>`;
  });
  s = s.replace(/(^|\n)((?:\d+\. .*(?:\n|$))+)/g, (m, pre, block) => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
    return `${pre}<ol>${items}</ol>`;
  });
  s = s.split(/\n{2,}/).map(p => (/^<(h1|h2|h3|ul|ol|pre|blockquote|hr)/.test(p.trim())) ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('\n');
  return s;
}
function renderMarkdownInto(container, md) {
  container.classList.add('md');
  container.innerHTML = markdownToHtml(md);
  $$('.wikilink', container).forEach(a => a.addEventListener('click', async () => {
    const title = a.getAttribute('data-wikilink');
    const arts = await getActiveArticles();
    const match = arts.find(x => x.title.toLowerCase() === title.toLowerCase()) ||
                  arts.find(x => x.title.toLowerCase().includes(title.toLowerCase()));
    if (match) openArticleModal(match); else toast(`No existe todavía un artículo "${title}"`, 'info');
  }));
}

/* ---------------------------------------------------------------------------
   5. EXTRACCIÓN DE TEXTO DE ARCHIVOS (pdf.js para PDFs)
--------------------------------------------------------------------------- */
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
async function extractTextFromFile(file) {
  const name = file.name.toLowerCase();
  if (name.endsWith('.pdf')) return extractTextFromPdfBlob(file);
  if (name.match(/\.(txt|md|markdown)$/)) return file.text();
  // intento genérico
  try { return await file.text(); } catch { return ''; }
}
async function extractTextFromPdfBlob(blobOrFile) {
  const buf = await blobOrFile.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  const maxPages = Math.min(pdf.numPages, 60);
  for (let i = 1; i <= maxPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n\n';
  }
  return text;
}
/* ---------------------------------------------------------------------------
   6. MÓDULO A — INGESTA Y COMPILACIÓN (documentos → artículos de wiki)
--------------------------------------------------------------------------- */
async function getActiveArticles() { return (await dbGetAll('articles')).filter(a => !a.deletedAt); }
async function getActiveDocuments() { return (await dbGetAll('documents')).filter(d => !d.deletedAt); }
async function getActiveReports() { return (await dbGetAll('reports')).filter(r => !r.deletedAt); }

/* Plantillas de artículo (#12): guían el formato que pide la IA al compilar */
const ARTICLE_TEMPLATES = {
  libre: { label: 'Libre (por defecto)', instructions: 'Estructura el contenido como creas más útil para un artículo de wiki personal.' },
  paper: { label: 'Ficha de paper', instructions: 'Estructura cada artículo con encabezados: "## Problema", "## Método", "## Resultados", "## Relevancia para mí". Sé conciso en cada sección.' },
  concepto: { label: 'Concepto técnico', instructions: 'Estructura cada artículo con encabezados: "## Definición", "## Cómo funciona", "## Ejemplo", "## Conceptos relacionados".' },
  reunion: { label: 'Notas de reunión/clase', instructions: 'Estructura cada artículo con encabezados: "## Puntos clave", "## Decisiones", "## Acciones pendientes".' },
};

async function addDocument({ title, text, sourceType = 'upload', meta = {}, tags = [] }) {
  const doc = { id: uid(), title, text, sourceType, meta, tags, createdAt: Date.now(), processed: false, deletedAt: null };
  await dbPut('documents', doc);
  return doc;
}

/* Deduplicación por similitud de contenido (#15): huella de shingles de palabras */
function contentFingerprint(text) {
  const words = (text || '').toLowerCase().replace(/[^\wáéíóúñ\s]/g, '').split(/\s+/).filter(Boolean);
  const shingles = new Set();
  for (let i = 0; i < words.length - 4; i += 5) shingles.add(words.slice(i, i + 5).join(' '));
  return shingles;
}
function jaccard(a, b) {
  if (!a.size || !b.size) return 0;
  let inter = 0; for (const x of a) if (b.has(x)) inter++;
  return inter / (a.size + b.size - inter);
}
async function findPossibleDuplicates(text, { threshold = 0.35 } = {}) {
  const docs = await getActiveDocuments();
  const fp = contentFingerprint(text);
  const matches = [];
  for (const d of docs) {
    const sim = jaccard(fp, contentFingerprint(d.text));
    if (sim >= threshold) matches.push({ doc: d, similarity: sim });
  }
  return matches.sort((a, b) => b.similarity - a.similarity);
}

async function compileDocument(doc, { silent = false, templateKey = 'libre' } = {}) {
  const template = ARTICLE_TEMPLATES[templateKey] || ARTICLE_TEMPLATES.libre;
  const system = `Eres un asistente de investigación que crea una wiki de conocimiento personal.
Analiza el documento y devuelve JSON estricto con este formato:
{
  "summary": "resumen de 3 líneas",
  "concepts": ["Concepto 1", "Concepto 2"],
  "articles": [{"title": "Título del artículo", "content": "Contenido en Markdown, usa [[Enlaces]] a otros conceptos cuando tenga sentido"}]
}
Crea entre 1 y 4 artículos por documento, uno por cada concepto principal distinto. El contenido debe ser sustancioso (mínimo 120 palabras cada uno).
FORMATO DE CADA ARTÍCULO: ${template.instructions}`;
  const prompt = `Analiza el documento "${doc.title}".\n\nCONTENIDO:\n${(doc.text || '').slice(0, 9000)}`;
  const result = await callLLMJSON(system, prompt);

  const now = Date.now();
  const articles = await getActiveArticles();
  const createdOrUpdated = [];

  for (const art of (result.articles || [])) {
    const existing = articles.find(a => a.title.toLowerCase() === art.title.toLowerCase());
    if (existing) {
      existing.content += `\n\n## Actualización desde "${doc.title}"\n${art.content}`;
      existing.modifiedAt = now;
      existing.sources = Array.from(new Set([...(existing.sources || []), doc.id]));
      existing.embedding = null; // forzar reindexado
      await dbPut('articles', existing);
      createdOrUpdated.push(existing);
    } else {
      const newArt = {
        id: uid(), title: art.title, content: art.content,
        summary: result.summary || '', concepts: result.concepts || [], tags: doc.tags || [],
        sources: [doc.id], createdAt: now, modifiedAt: now, embedding: null, deletedAt: null,
      };
      await dbPut('articles', newArt);
      articles.push(newArt);
      createdOrUpdated.push(newArt);
    }
  }
  doc.processed = true;
  doc.summary = result.summary || '';
  doc.concepts = result.concepts || [];
  await dbPut('documents', doc);
  if (!silent) toast(`"${doc.title}" procesado → ${createdOrUpdated.length} artículo(s)`, 'success');
  return createdOrUpdated;
}

async function compileAllPending(onProgress) {
  const docs = (await getActiveDocuments()).filter(d => !d.processed);
  let done = 0;
  for (const doc of docs) {
    try { await compileDocument(doc, { silent: true }); }
    catch (e) { console.error(e); toast(`Error procesando "${doc.title}": ${e.message}`, 'error'); }
    done++;
    onProgress && onProgress(done, docs.length, doc.title);
  }
  if (docs.length) await buildSearchIndex();
  return docs.length;
}

/* ---------------------------------------------------------------------------
   7. MÓDULO F — ÍNDICE SEMÁNTICO (embeddings + coseno, sin FAISS)
--------------------------------------------------------------------------- */
async function buildSearchIndex(onProgress) {
  const articles = await getActiveArticles();
  const toIndex = articles.filter(a => !a.embedding);
  let done = 0;
  for (const art of toIndex) {
    try {
      const snippet = `${art.title}\n\n${(art.content || '').slice(0, 800)}`;
      art.embedding = await getEmbedding(snippet);
      await dbPut('articles', art);
    } catch (e) { console.error('Error indexando', art.title, e); }
    done++;
    onProgress && onProgress(done, toIndex.length, art.title);
  }
  return toIndex.length;
}

async function semanticSearch(query, topK = 5, { tag = null } = {}) {
  let articles = (await getActiveArticles()).filter(a => a.embedding);
  if (tag) articles = articles.filter(a => (a.tags || []).includes(tag));
  if (!articles.length) return [];
  const qEmb = await getEmbedding(query);
  const scored = articles.map(a => ({ article: a, score: cosineSim(qEmb, a.embedding) }));
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, topK);
}

async function askWiki(query, topK = 5) {
  const hits = await semanticSearch(query, topK);
  let context = '';
  if (!hits.length) {
    const arts = await getActiveArticles();
    context = arts.slice(0, 8).map(a => `### ${a.title}\n${(a.content || '').slice(0, 1200)}`).join('\n\n');
  } else {
    context = hits.map(h => `### ${h.article.title} (relevancia: ${h.score.toFixed(2)})\n${(h.article.content || '').slice(0, 1500)}`).join('\n\n');
  }
  const answer = await callLLM(
    'Eres un asistente experto que responde basándote estrictamente en el contexto de la wiki personal proporcionado. Usa [[enlaces]] a artículos cuando cites conceptos de la wiki. Responde en Markdown, en español.',
    `CONTEXTO DE LA WIKI:\n${context}\n\nPREGUNTA: ${query}`
  );
  const entry = { id: uid(), query, answer, hitTitles: hits.map(h => h.article.title), createdAt: Date.now() };
  await dbPut('qaHistory', entry);
  return { answer, hits };
}

   9. MÓDULO C — LINT DE LA WIKI (salud / integridad)
--------------------------------------------------------------------------- */
async function lintWiki() {
  const articles = await getActiveArticles();
  if (!articles.length) return { report: 'No hay artículos para analizar todavía.', raw: null };
  let structure = '';
  for (const a of articles) {
    const links = Array.from((a.content || '').matchAll(/\[\[([^\]]+)\]\]/g)).map(m => m[1]);
    structure += `Artículo: ${a.title}\nEnlaces: ${links.join(', ') || '(ninguno)'}\n\n`;
  }
  const system = `Eres un arquitecto de datos revisando una wiki de conocimiento personal. Encuentra problemas:
1. Enlaces rotos (apuntan a artículos que no existen)
2. Posibles sinónimos / duplicados (dos artículos que tratan lo mismo)
3. Artículos que parecen vacíos o muy cortos
Devuelve SOLO JSON: {"broken_links":[{"file":"","missing_link":""}],"synonyms":[{"name1":"","name2":""}],"missing_data":[],"suggestions":[]}`;
  const titles = articles.map(a => a.title).join(', ');
  const result = await callLLMJSON(system, `TÍTULOS EXISTENTES: ${titles}\n\nESTRUCTURA:\n${structure.slice(0, 9000)}`);
  return { raw: result, articles };
}

async function renameArticle(id, newTitle) {
  const target = await dbGet('articles', id);
  if (!target) return;
  const oldTitle = target.title;
  target.title = newTitle; target.modifiedAt = Date.now();
  await dbPut('articles', target);
  const others = await getActiveArticles();
  const escaped = oldTitle.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`\\[\\[${escaped}\\]\\]`, 'gi');
  for (const a of others) {
    if (a.id === id) continue;
    if (re.test(a.content)) {
      a.content = a.content.replace(re, `[[${newTitle}]]`);
      a.modifiedAt = Date.now();
      await dbPut('articles', a);
    }
  }
}

async function mergeArticles(idA, idB, { keepTitle = null } = {}) {
  const a = await dbGet('articles', idA), b = await dbGet('articles', idB);
  if (!a || !b) return null;
  const finalTitle = keepTitle || a.title;
  const merged = {
    ...a, title: finalTitle,
    content: `${a.content}\n\n---\n\n## Fusionado desde "${b.title}"\n\n${b.content}`,
    concepts: Array.from(new Set([...(a.concepts || []), ...(b.concepts || [])])),
    tags: Array.from(new Set([...(a.tags || []), ...(b.tags || [])])),
    sources: Array.from(new Set([...(a.sources || []), ...(b.sources || [])])),
    modifiedAt: Date.now(), embedding: null,
  };
  await dbPut('articles', merged);
  const others = await getActiveArticles();
  const escaped = b.title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`\\[\\[${escaped}\\]\\]`, 'gi');
  for (const other of others) {
    if (other.id === b.id || other.id === a.id) continue;
    if (re.test(other.content)) { other.content = other.content.replace(re, `[[${finalTitle}]]`); other.modifiedAt = Date.now(); await dbPut('articles', other); }
  }
  b.deletedAt = Date.now();
  await dbPut('articles', b);
  return merged;
}

async function getBacklinks(article) {
  const others = await getActiveArticles();
  return others.filter(a => a.id !== article.id && extractWikilinks(a.content).some(l => l.toLowerCase() === article.title.toLowerCase()));
}
async function getOrphanArticles() {
  const articles = await getActiveArticles();
  const titleSet = new Set(articles.map(a => a.title.toLowerCase()));
  const linkedTo = new Set();
  articles.forEach(a => extractWikilinks(a.content).forEach(l => { if (titleSet.has(l.toLowerCase())) linkedTo.add(l.toLowerCase()); }));
  return articles.filter(a => {
    const outLinks = extractWikilinks(a.content).filter(l => titleSet.has(l.toLowerCase()));
    return outLinks.length === 0 && !linkedTo.has(a.title.toLowerCase());
  });
}

function extractWikilinks(content) {
  return Array.from((content || '').matchAll(/\[\[([^\]]+)\]\]/g)).map(m => m[1]);
}

const DEFAULT_PRICING = { inPerM: 0.15, outPerM: 0.60 }; // USD por 1M tokens, aprox. gpt-4o-mini
Settings.getPricing = function () { return JSON.parse(localStorage.getItem('sb_pricing') || 'null') || DEFAULT_PRICING; };

function estimateCost(inputTokens, outputTokens) {
  const p = Settings.getPricing();
  return (inputTokens / 1e6) * p.inPerM + (outputTokens / 1e6) * p.outPerM;
}
function estimateCurationCost({ nQueries, sources, maxPerSource }) {
  const queriesPerSource = Math.min(nQueries, 4);
  const estPapers = sources.length * queriesPerSource * maxPerSource;
  const scoringBatches = Math.ceil(estPapers / 15) || 1;
  const calls = 1 + scoringBatches; // generar queries + lotes de scoring
  const inputTokens = 400 + scoringBatches * (estPapers * 60 + 500);
  const outputTokens = 300 + estPapers * 90;
  return { calls, estPapers, inputTokens, outputTokens, cost: estimateCost(inputTokens, outputTokens) };
}
function estimateResearchCost({ iterations }) {
  const perIter = 1 + 5 + 1 + 2; // planificador + ~5 investigador + crítico + ~2 huecos
  const synthCalls = Math.max(0, iterations - 1) * 2;
  const calls = iterations * perIter + synthCalls + 1; // +1 informe final
  const inputTokens = calls * 1200;
  const outputTokens = calls * 500 + 3500; // el informe final es largo
  return { calls, inputTokens, outputTokens, cost: estimateCost(inputTokens, outputTokens) };
}

const CurationReminder = {

  setConfig(cfg) { localStorage.setItem('sb_curation_reminder', JSON.stringify(cfg)); },

  async checkAndNotify() {
    const cfg = this.getConfig();
    if (!cfg.enabled) return;
    const due = !cfg.lastRun || (Date.now() - cfg.lastRun) > cfg.intervalDays * 86400000;
    if (!due) return;
    if (!('Notification' in window)) { toast('Toca curar papers nuevos — han pasado varios días desde la última vez.', 'info', 7000); return; }
    if (Notification.permission === 'granted') {
      new Notification('Segundo Cerebro', { body: 'Han pasado varios días: prueba a lanzar una curaduría de papers nuevos.' });
    } else if (Notification.permission !== 'denied') {
      toast('Activa las notificaciones en Ajustes para recibir recordatorios de curaduría.', 'info', 6000);
    }
  },
  async requestPermission() {
    if (!('Notification' in window)) { toast('Tu navegador no soporta notificaciones.', 'error'); return false; }
    const perm = await Notification.requestPermission();
    return perm === 'granted';
  },
};

const DEFAULT_SEARCH_QUERIES = [

JSON: {"queries": ["query1", "query2", ... ${nQueries} en total]}`;

async function fetchArxiv(query, maxResults = 8) {
  const url = `https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(query)}&start=0&max_results=${maxResults}&sortBy=submittedDate&sortOrder=descending`;
  try {
    const res = await fetch(url);
    if (!res.ok) return [];
    const xml = await res.text();
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const entries = Array.from(doc.getElementsByTagName('entry'));
    return entries.map(en => {
      const idRaw = en.getElementsByTagName('id')[0]?.textContent || '';
      const arxivId = idRaw.split('/abs/').pop().trim();
      const title = (en.getElementsByTagName('title')[0]?.textContent || '').replace(/\s+/g, ' ').trim();
      const abstract = (en.getElementsByTagName('summary')[0]?.textContent || '').replace(/\s+/g, ' ').trim();
      const authors = Array.from(en.getElementsByTagName('author')).map(a => a.getElementsByTagName('name')[0]?.textContent || '').slice(0, 5);
      const published = (en.getElementsByTagName('published')[0]?.textContent || '').slice(0, 10);
      return {
        paper_id: arxivId, source_db: 'arxiv', title, abstract: abstract.slice(0, 800),
        authors, published, pdf_url: `https://arxiv.org/pdf/${arxivId}`,
        landing_url: `https://arxiv.org/abs/${arxivId}`, doi: '',
      };
    }).filter(p => p.title);
  } catch (e) { console.warn('arXiv error', e); return []; }
}

async function fetchSemanticScholar(query, maxResults = 8) {
  const url = `https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(query)}&limit=${maxResults}&fields=paperId,title,abstract,authors,year,publicationDate,openAccessPdf,externalIds,isOpenAccess`;
  try {
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    return (data.data || []).map(p => {
      const ext = p.externalIds || {};
      let pdfUrl = (p.isOpenAccess && p.openAccessPdf) ? (p.openAccessPdf.url || '') : '';
      const arxiv = ext.ArXiv || '';
      if (arxiv && !pdfUrl) pdfUrl = `https://arxiv.org/pdf/${arxiv}`;
      const paperId = arxiv || ext.DOI || p.paperId;
      return {
        paper_id: paperId, source_db: 'semantic_scholar', title: (p.title || '').trim(),
        abstract: (p.abstract || '').slice(0, 800), authors: (p.authors || []).map(a => a.name).slice(0, 5),
        published: p.publicationDate || String(p.year || ''), pdf_url: pdfUrl,
        landing_url: `https://www.semanticscholar.org/paper/${p.paperId}`, doi: ext.DOI || '',
      };
    }).filter(p => p.title);
  } catch (e) { console.warn('Semantic Scholar error', e); return []; }
}

async function fetchPubmed(query, maxResults = 8) {
  try {
    const searchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(query)}&retmax=${maxResults}&retmode=json&sort=date`;
    const searchRes = await fetch(searchUrl);
    if (!searchRes.ok) return [];
    const searchData = await searchRes.json();
    const ids = searchData.esearchresult?.idlist || [];
    if (!ids.length) return [];
    const fetchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id=${ids.join(',')}&retmode=xml&rettype=abstract`;
    const fetchRes = await fetch(fetchUrl);
    if (!fetchRes.ok) return [];
    const xml = await fetchRes.text();
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const articles = Array.from(doc.getElementsByTagName('PubmedArticle'));
    return articles.map(art => {
      const pmid = art.querySelector('PMID')?.textContent || '';
      const pmcidEl = Array.from(art.querySelectorAll('ArticleId')).find(n => n.getAttribute('IdType') === 'pmc');
      const doiEl = Array.from(art.querySelectorAll('ArticleId')).find(n => n.getAttribute('IdType') === 'doi');
      const pmcid = pmcidEl?.textContent || '';
      const title = art.querySelector('ArticleTitle')?.textContent || '';
      const abstract = Array.from(art.querySelectorAll('AbstractText')).map(n => n.textContent || '').join(' ').slice(0, 800);
      const authors = Array.from(art.querySelectorAll('Author')).slice(0, 5).map(a => {
        const last = a.querySelector('LastName')?.textContent || '';
        const fore = a.querySelector('ForeName')?.textContent || '';
        return `${last} ${fore}`.trim();
      });
      const year = art.querySelector('PubDate Year')?.textContent || '';
      const month = art.querySelector('PubDate Month')?.textContent || '01';
      const published = year ? `${year}-${month}-01` : '';
      const pdfUrl = pmcid ? `https://europepmc.org/backend/ptpmcrender.fcgi?accid=${pmcid}&blobtype=pdf` : '';
      return {
        paper_id: pmcid || doiEl?.textContent || `pmid_${pmid}`, source_db: 'pubmed', title,
        abstract, authors, published: published.slice(0, 10), pdf_url: pdfUrl,
        landing_url: `https://pubmed.ncbi.nlm.nih.gov/${pmid}/`, doi: doiEl?.textContent || '',
      };
    }).filter(p => p.title);
  } catch (e) { console.warn('PubMed error', e); return []; }
}

const SOURCE_FNS = { arxiv: fetchArxiv, semantic_scholar: fetchSemanticScholar, pubmed: fetchPubmed };

async function scorePapersBatch(papers, scoreThreshold) {

    const system = `Eres un curador experto de investigación. Evalúa cada paper según el perfil de intereses.

JSON estricto: {"scores":[{"idx":1,"relevance_score":0,"novelty_score":0,"impact_score":0,"final_score":0,"key_concepts":[],"summary":"","reason":"","should_ingest":false}]}`;

async function getSeenIds() {
  const rows = await dbGetAll('curationSeen');
  return new Set(rows.map(r => r.id));
}
async function markSeen(paperId) { await dbPut('curationSeen', { id: paperId }); }

async function runCuration({ threshold = 7, maxPerSource = 6, sources = ['arxiv', 'semantic_scholar', 'pubmed'], nQueries = 6 }, onLog) {
  const log = (m) => onLog && onLog(m);
  log({ text: 'Generando queries desde tu perfil de intereses…', type: 'head' });
  const queries = await generateSearchQueries(nQueries);
  log({ text: `${queries.length} queries: ${queries.slice(0, 3).join(' · ')}…`, type: 'ok' });

  const seenIds = await getSeenIds();
  let allPapers = [];
  for (const source of sources) {
    const fn = SOURCE_FNS[source]; if (!fn) continue;
    log({ text: `[${source.toUpperCase()}] consultando…`, type: 'head' });
    let count = 0;
    for (const q of queries.slice(0, 4)) {
      try {
        const papers = await fn(q, maxPerSource);
        const fresh = papers.filter(p => p.paper_id && !seenIds.has(p.paper_id) && p.title);
        allPapers.push(...fresh); count += fresh.length;
        await new Promise(r => setTimeout(r, 250));
      } catch (e) { log({ text: `Error en ${source}/${q}: ${e.message}`, type: 'err' }); }
    }
    log({ text: `→ ${count} papers nuevos`, type: 'ok' });
  }
  // dedup por título normalizado
  const seenTitles = new Set(); const unique = [];
  for (const p of allPapers) {
    const norm = p.title.toLowerCase().replace(/\W+/g, ' ').trim().slice(0, 60);
    if (norm && !seenTitles.has(norm)) { seenTitles.add(norm); unique.push(p); }
  }
  log({ text: `${unique.length} papers únicos a evaluar`, type: 'head' });
  if (!unique.length) return { accepted: [], rejected: [], queries };

  log({ text: `Puntuando con IA…`, type: 'head' });
  const scored = await scorePapersBatch(unique, threshold);
  const accepted = scored.filter(p => p.should_ingest).sort((a, b) => b.final_score - a.final_score);
  const rejected = scored.filter(p => !p.should_ingest).sort((a, b) => b.final_score - a.final_score);
  log({ text: `Aceptados: ${accepted.length} · Filtrados: ${rejected.length}`, type: 'ok' });
  CurationReminder.markRun();
  return { accepted, rejected, queries };
}

async function ingestPaper(paper) {
  await markSeen(paper.paper_id);
  let text = '';
  let gotPdf = false;
  if (paper.pdf_url) {
    try {
      const res = await fetch(paper.pdf_url);
      if (res.ok) {
        const blob = await res.blob();
        if (blob.size > 8000) {
          text = await extractTextFromPdfBlob(blob);
          gotPdf = true;
        }
      }
    } catch (e) { /* bloqueado por CORS o similar: seguimos con metadatos */ }
  }
  if (!gotPdf) {
    text = `# ${paper.title}\n\nAutores: ${(paper.authors || []).join(', ')}\nPublicado: ${paper.published || ''}\nFuente: ${paper.source_db}\nDOI: ${paper.doi || 'N/A'}\nEnlace: ${paper.landing_url || ''}\n\n## Resumen\n${paper.summary || paper.abstract || ''}\n\n## Conceptos clave\n${(paper.key_concepts || []).join(', ')}`;
  }
  const doc = await addDocument({
    title: paper.title, text,
    sourceType: gotPdf ? 'curation-pdf' : 'curation-metadata',
    meta: { source_db: paper.source_db, landing_url: paper.landing_url, doi: paper.doi, final_score: paper.final_score },
  });
  return compileDocument(doc, { silent: true });
}

/* ---------------------------------------------------------------------------
   11. DEEP RESEARCH — sistema multi-agente (planner → researcher → critic →
   synthesizer → final reporter), con wiki efímera en memoria.
--------------------------------------------------------------------------- */
class EphemeralWiki {
  constructor() { this.articles = {}; this.index = []; }
  addArticle(title, content, summary = '', concepts = []) {
    this.articles[title] = content;
    this.index.push({ title, summary, concepts });
  }
  updateArticle(title, newContent) { if (this.articles[title]) this.articles[title] = newContent; }
  getIndexText() { return this.index.map(e => `## ${e.title}\n${e.summary}`).join('\n'); }
  getFullText(maxChars = 20000) {
    let parts = [], total = 0;
    for (const [title, content] of Object.entries(this.articles)) {
      const chunk = `\n\n---\n# ${title}\n${content}`;
      total += chunk.length; if (total > maxChars) break;
      parts.push(chunk);
    }
    return parts.join('');
  }
}

async function agentPlanner(query, wikiContext = '') {
  const system = `Investigador experto en planificación. Descompón el tema en 4-7 subtemas concretos y preguntas de investigación, en español.
JSON: {"subtopics":[],"research_questions":[],"priority_order":[]}`;
  return callLLMJSON(system, `CONSULTA: ${query}\n${wikiContext ? 'WIKI:\n' + wikiContext.slice(0, 4000) : ''}`);
}
async function agentResearcher(subtopic, query, existingWiki = '') {
  const system = `Investigador. Escribe un artículo de wiki detallado sobre el subtema, en español, con Markdown y [[enlaces]] a otros conceptos.
JSON: {"title":"","summary":"","concepts":[],"content":"(mínimo 250 palabras)"}`;
  let prompt = `CONSULTA GENERAL: ${query}\nSUBTEMA: ${subtopic}\n`;
  if (existingWiki) prompt += `CONTEXTO EXISTENTE (expande, no repitas):\n${existingWiki.slice(0, 3000)}`;
  return callLLMJSON(system, prompt);
}
async function agentCritic(wiki, query) {
  const system = `Crítico académico. Analiza la wiki generada hasta ahora y detecta huecos.
JSON: {"gaps":[],"contradictions":[],"opportunities":[],"missing_subtopics":[]}`;
  return callLLMJSON(system, `CONSULTA: ${query}\n\nWIKI:\n${wiki.getFullText(12000)}`);
}
async function agentSynthesizer(wiki, articleTitle, critique) {
  if (!wiki.articles[articleTitle]) return '';
  return callLLM('Editor de conocimiento. Mejora el artículo incorporando las críticas. Responde solo con Markdown, en español.',
    `ARTÍCULO:\n${wiki.articles[articleTitle]}\n\nLAGUNAS:\n${(critique.gaps || []).join('\n')}\n\nOPORTUNIDADES:\n${(critique.opportunities || []).join('\n')}`);
}
async function agentFinalReporter(wiki, query, iterationLog) {
  const logSummary = iterationLog.map((l, i) => `It.${i + 1}: ${l.action} → ${l.result}`).join('\n');
  return callLLM('Investigador senior. Escribe un informe exhaustivo en Markdown (mínimo 900 palabras), en español: resumen ejecutivo, análisis temático, hallazgos, conexiones entre conceptos, preguntas abiertas.',
    `CONSULTA: ${query}\n\nLOG:\n${logSummary}\n\nWIKI:\n${wiki.getFullText(25000)}`,
    { model: Settings.getFrontierModel() });
}

async function deepResearch(query, iterations = 2, onLog) {
  const log = (text, type = 'ok') => onLog && onLog({ text, type });
  const wiki = new EphemeralWiki();
  const iterationLog = [];
  log(`Deep research: "${query}" · ${iterations} iteración(es)`, 'head');

  for (let iter = 0; iter < iterations; iter++) {
    log(`— Iteración ${iter + 1}/${iterations} —`, 'head');
    const plan = await agentPlanner(query, wiki.getIndexText());
    const subtopics = plan.subtopics || [];
    log(`Planificador → ${subtopics.length} subtemas: ${subtopics.join(', ')}`);
    iterationLog.push({ action: `Plan it.${iter + 1}`, result: subtopics.join(', ') });

    let newArts = 0;
    for (const subtopic of subtopics) {
      try {
        const art = await agentResearcher(subtopic, query, wiki.articles[subtopic] || '');
        wiki.addArticle(art.title, art.content, art.summary, art.concepts);
        newArts++;
        log(`  ✓ Investigado: ${art.title}`);
      } catch (e) { log(`  ✗ Error investigando "${subtopic}": ${e.message}`, 'err'); }
    }
    iterationLog.push({ action: `Investigación it.${iter + 1}`, result: `${newArts} artículos` });

    log('Crítico analizando…');
    let critique = {};
    try {
      critique = await agentCritic(wiki, query);
      log(`${(critique.gaps || []).length} lagunas · ${(critique.missing_subtopics || []).length} subtemas faltantes`);
      iterationLog.push({ action: `Crítica it.${iter + 1}`, result: `Lagunas: ${(critique.gaps || []).slice(0, 2).join('; ')}` });
      for (const miss of (critique.missing_subtopics || []).slice(0, 3)) {
        try {
          const art = await agentResearcher(miss, query);
          wiki.addArticle(art.title, art.content, art.summary, art.concepts);
          log(`  ✓ Cubierto hueco: ${art.title}`);
        } catch (e) { log(`  ✗ ${e.message}`, 'err'); }
      }
    } catch (e) { log(`Error en crítica: ${e.message}`, 'err'); }

    if (iter < iterations - 1) {
      log('Sintetizador refinando artículos…');
      for (const title of Object.keys(wiki.articles).slice(0, 2)) {
        try {
          const improved = await agentSynthesizer(wiki, title, critique);
          if (improved) wiki.updateArticle(title, improved);
        } catch (e) { log(`  ✗ ${e.message}`, 'err'); }
      }
    }
  }

  log(`Informe final (${Settings.getFrontierModel()})…`, 'head');
  const finalReport = await agentFinalReporter(wiki, query, iterationLog);
  log('Completado.', 'ok');

  const report = {
    id: uid(), query, content: finalReport, iterations,
    articleCount: Object.keys(wiki.articles).length, createdAt: Date.now(),
    wikiArticles: wiki.articles,
  };
  await dbPut('reports', report);
  return report;
}

/* ---------------------------------------------------------------------------
   12. MÓDULO G — GRAFO DE CONOCIMIENTO
   Layout de fuerzas simple (repulsión + resortes en enlaces) calculado en JS,
   sin dependencias externas. Render en SVG con arrastre de nodos.
--------------------------------------------------------------------------- */
async function buildGraphData({ tag = null } = {}) {
  let articles = await getActiveArticles();
  if (tag) articles = articles.filter(a => (a.tags || []).includes(tag));
  const titleToId = {};
  articles.forEach(a => titleToId[a.title.toLowerCase()] = a.id);
  const nodes = articles.map(a => ({
    id: a.id, title: a.title, degree: 0, tags: a.tags || [],
  }));
  const edgesSet = new Set();
  const edges = [];
  for (const a of articles) {
    const links = extractWikilinks(a.content);
    for (const l of links) {
      const targetId = titleToId[l.toLowerCase()];
      if (targetId && targetId !== a.id) {
        const key = [a.id, targetId].sort().join('::');
        if (!edgesSet.has(key)) { edgesSet.add(key); edges.push({ source: a.id, target: targetId }); }
      }
    }
  }
  const degree = {};
  edges.forEach(e => { degree[e.source] = (degree[e.source] || 0) + 1; degree[e.target] = (degree[e.target] || 0) + 1; });
  nodes.forEach(n => n.degree = degree[n.id] || 0);
  assignClusters(nodes, edges);
  return { nodes, edges };
}

/* Detección de islas / clusters desconectados (#18) vía BFS */
function assignClusters(nodes, edges) {
  const adj = {}; nodes.forEach(n => adj[n.id] = []);
  edges.forEach(e => { adj[e.source].push(e.target); adj[e.target].push(e.source); });
  const visited = new Set();
  let clusterId = 0;
  const clusters = [];
  for (const n of nodes) {
    if (visited.has(n.id)) continue;
    const queue = [n.id]; visited.add(n.id);
    const members = [];
    while (queue.length) {
      const cur = queue.shift(); members.push(cur);
      for (const nb of adj[cur]) if (!visited.has(nb)) { visited.add(nb); queue.push(nb); }
    }
    members.forEach(id => { const node = nodes.find(x => x.id === id); if (node) node.clusterId = clusterId; });
    clusters.push({ id: clusterId, memberIds: members });
    clusterId++;
  }
  return clusters;
}
function getGraphClusters(nodes, edges) { return assignClusters(nodes, edges); }
const CLUSTER_COLORS = ['#d4a24c', '#5ba39f', '#a97fc9', '#c9705c', '#7fae72', '#5c8fc9', '#c9a05c', '#8f7fc9'];

function forceLayout(nodes, edges, width, height, iterations = 260) {
  const pos = {};
  nodes.forEach((n, i) => {
    const angle = (i / nodes.length) * Math.PI * 2;
    pos[n.id] = { x: width / 2 + Math.cos(angle) * 80 + (Math.random() - .5) * 30, y: height / 2 + Math.sin(angle) * 80 + (Math.random() - .5) * 30 };
  });
  const k = Math.sqrt((width * height) / Math.max(nodes.length, 1)) * 0.9;
  for (let it = 0; it < iterations; it++) {
    const disp = {}; nodes.forEach(n => disp[n.id] = { x: 0, y: 0 });
    // repulsión
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        let dx = pos[a.id].x - pos[b.id].x, dy = pos[a.id].y - pos[b.id].y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const force = (k * k) / dist;
        dx /= dist; dy /= dist;
        disp[a.id].x += dx * force; disp[a.id].y += dy * force;
        disp[b.id].x -= dx * force; disp[b.id].y -= dy * force;
      }
    }
    // atracción por enlaces
    edges.forEach(e => {
      let dx = pos[e.source].x - pos[e.target].x, dy = pos[e.source].y - pos[e.target].y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
      const force = (dist * dist) / k;
      dx /= dist; dy /= dist;
      disp[e.source].x -= dx * force; disp[e.source].y -= dy * force;
      disp[e.target].x += dx * force; disp[e.target].y += dy * force;
    });
    // aplicar con enfriamiento + centrado
    const temp = Math.max(0.5, 12 * (1 - it / iterations));
    nodes.forEach(n => {
      const d = disp[n.id];
      const len = Math.sqrt(d.x * d.x + d.y * d.y) || 0.01;
      pos[n.id].x += (d.x / len) * Math.min(len, temp);
      pos[n.id].y += (d.y / len) * Math.min(len, temp);
      // atracción suave al centro
      pos[n.id].x += (width / 2 - pos[n.id].x) * 0.003;
      pos[n.id].y += (height / 2 - pos[n.id].y) * 0.003;
      pos[n.id].x = Math.max(24, Math.min(width - 24, pos[n.id].x));
      pos[n.id].y = Math.max(24, Math.min(height - 24, pos[n.id].y));
    });
  }
  return pos;
}

function renderGraphSVG(container, { nodes, edges }, { width, height, interactive = true, mode = 'open', colorByCluster = false, onNodeClick = null, onNodeSelect = null } = {}) {
  container.innerHTML = '';
  if (!nodes.length) {
    container.appendChild(el('div', { class: 'empty-state' }, [
      el('h3', {}, 'Todavía no hay grafo'), el('p', {}, 'Añade documentos y compílalos en artículos para ver las conexiones entre conceptos.')
    ]));
    return;
  }
  const pos = forceLayout(nodes, edges, width, height, interactive ? 260 : 140);
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svg.setAttribute('width', '100%'); svg.setAttribute('height', '100%');
  svg.style.display = 'block';

  const adj = {}; nodes.forEach(n => adj[n.id] = new Set());
  edges.forEach(e => { adj[e.source].add(e.target); adj[e.target].add(e.source); });
  const nodeColor = (n) => colorByCluster ? CLUSTER_COLORS[n.clusterId % CLUSTER_COLORS.length] : (n.degree > 0 ? '#d4a24c' : '#5ba39f');

  const gEdges = document.createElementNS(svg.namespaceURI, 'g');
  edges.forEach(e => {
    const line = document.createElementNS(svg.namespaceURI, 'line');
    line.setAttribute('x1', pos[e.source].x); line.setAttribute('y1', pos[e.source].y);
    line.setAttribute('x2', pos[e.target].x); line.setAttribute('y2', pos[e.target].y);
    line.setAttribute('stroke', '#3a4050'); line.setAttribute('stroke-width', interactive ? 1.2 : 1);
    line.dataset.source = e.source; line.dataset.target = e.target;
    gEdges.appendChild(line);
  });
  svg.appendChild(gEdges);

  const gNodes = document.createElementNS(svg.namespaceURI, 'g');
  const maxDeg = Math.max(1, ...nodes.map(n => n.degree));
  let selectedId = null;

  function applyHighlight() {
    if (mode !== 'select') return;
    const neighbors = selectedId ? adj[selectedId] : null;
    gNodes.childNodes.forEach(g => {
      const nid = g.dataset.id;
      const dim = selectedId && nid !== selectedId && !(neighbors && neighbors.has(nid));
      g.style.opacity = dim ? 0.25 : 1;
    });
    gEdges.childNodes.forEach(line => {
      const rel = selectedId && (line.dataset.source === selectedId || line.dataset.target === selectedId);
      line.style.opacity = selectedId ? (rel ? 1 : 0.12) : 1;
      line.setAttribute('stroke', rel ? '#5ba39f' : '#3a4050');
    });
  }

  nodes.forEach(n => {
    const r = interactive ? (5 + (n.degree / maxDeg) * 9) : (2.4 + (n.degree / maxDeg) * 3.5);
    const g = document.createElementNS(svg.namespaceURI, 'g');
    g.setAttribute('transform', `translate(${pos[n.id].x},${pos[n.id].y})`);
    g.dataset.id = n.id;
    g.style.cursor = interactive ? 'pointer' : 'default';
    const circle = document.createElementNS(svg.namespaceURI, 'circle');
    circle.setAttribute('r', r);
    circle.setAttribute('fill', nodeColor(n));
    circle.setAttribute('fill-opacity', interactive ? 0.9 : 0.75);
    g.appendChild(circle);
    if (interactive) {
      const label = document.createElementNS(svg.namespaceURI, 'text');
      label.textContent = truncate(n.title, 26);
      label.setAttribute('x', r + 6); label.setAttribute('y', 4);
      label.setAttribute('fill', '#c9c6ba'); label.setAttribute('font-size', '10.5');
      label.setAttribute('font-family', 'Inter, sans-serif'); label.style.pointerEvents = 'none';
      g.appendChild(label);
      g.addEventListener('click', () => {
        if (mode === 'select') { selectedId = (selectedId === n.id) ? null : n.id; applyHighlight(); onNodeSelect && onNodeSelect(selectedId ? n : null, Array.from(adj[n.id] || [])); }
        else { onNodeClick && onNodeClick(n); }
      });
      g.addEventListener('mouseenter', () => circle.setAttribute('fill', '#e8ad5f'));
      g.addEventListener('mouseleave', () => circle.setAttribute('fill', nodeColor(n)));
      // drag
      let dragging = false;
      g.addEventListener('pointerdown', (ev) => { dragging = true; g.setPointerCapture(ev.pointerId); });
      g.addEventListener('pointerup', () => dragging = false);
      g.addEventListener('pointermove', (ev) => {
        if (!dragging) return;
        const rect = svg.getBoundingClientRect();
        const scaleX = width / rect.width, scaleY = height / rect.height;
        const x = (ev.clientX - rect.left) * scaleX, y = (ev.clientY - rect.top) * scaleY;
        pos[n.id] = { x, y };
        g.setAttribute('transform', `translate(${x},${y})`);
        gEdges.childNodes.forEach(line => {
          if (line.dataset.source === n.id) { line.setAttribute('x1', x); line.setAttribute('y1', y); }
          if (line.dataset.target === n.id) { line.setAttribute('x2', x); line.setAttribute('y2', y); }
        });
      });
    }
    gNodes.appendChild(g);
  });
  svg.appendChild(gNodes);
  container.appendChild(svg);
}

/* Mini-grafo animado de la barra lateral: simple animación ambiente de "sinapsis" */
function initBrandCanvas(canvas) {
  if (!canvas) return;
  const ctx = canvas.getContext && canvas.getContext('2d');
  if (!ctx) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth || 34, h = canvas.clientHeight || 34;
  canvas.width = w * dpr; canvas.height = h * dpr; ctx.scale(dpr, dpr);
  const pts = [
    { x: w * 0.3, y: h * 0.32, c: '#d4a24c' }, { x: w * 0.72, y: h * 0.25, c: '#5ba39f' },
    { x: w * 0.78, y: h * 0.72, c: '#d4a24c' }, { x: w * 0.26, y: h * 0.75, c: '#5ba39f' },
  ];
  function draw(t) {
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(234,231,222,.35)'; ctx.lineWidth = 1;
    ctx.beginPath();
    pts.forEach((p, i) => { const n = pts[(i + 1) % pts.length]; ctx.moveTo(p.x, p.y); ctx.lineTo(n.x, n.y); });
    ctx.stroke();
    pts.forEach((p, i) => {
      const pulse = 1 + Math.sin(t / 700 + i) * 0.28;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.6 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = p.c; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

async function renderSidebarGraph(canvas) {
  if (!canvas) return;
  const ctx = canvas.getContext && canvas.getContext('2d');
  if (!ctx) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = rect.width || 220, h = 96;
  canvas.width = w * dpr; canvas.height = h * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const { nodes, edges } = await buildGraphData();
  ctx.clearRect(0, 0, w, h);
  if (!nodes.length) {
    ctx.fillStyle = '#5a5f70'; ctx.font = '11px Inter'; ctx.textAlign = 'center';
    ctx.fillText('Sin artículos aún', w / 2, h / 2);
    return;
  }
  const pos = forceLayout(nodes.slice(0, 60), edges, w, h, 90);
  ctx.strokeStyle = 'rgba(91,163,159,.35)'; ctx.lineWidth = 1;
  edges.forEach(e => { if (pos[e.source] && pos[e.target]) { ctx.beginPath(); ctx.moveTo(pos[e.source].x, pos[e.source].y); ctx.lineTo(pos[e.target].x, pos[e.target].y); ctx.stroke(); } });
  const maxDeg = Math.max(1, ...nodes.map(n => n.degree));
  nodes.forEach(n => {
    if (!pos[n.id]) return;
    const r = 1.8 + (n.degree / maxDeg) * 2.6;
    ctx.beginPath(); ctx.arc(pos[n.id].x, pos[n.id].y, r, 0, Math.PI * 2);
    ctx.fillStyle = n.degree > 0 ? '#d4a24c' : '#5ba39f'; ctx.fill();
  });
}

--------------------------------------------------------------------------- */
function openArticleModal(article, { editMode = false } = {}) {
  const state = { editing: editMode };
  const wrap = el('div', {});

  async function render() {
    wrap.innerHTML = '';
    const backlinks = await getBacklinks(article);

    const tagsRow = el('div', { class: 'tag-input-row', style: 'margin-bottom:12px' });
    (article.tags || []).forEach(t => tagsRow.appendChild(el('span', { class: 'tag-pill' }, [t, el('button', { onclick: async () => { await setArticleTags(article.id, (article.tags || []).filter(x => x !== t)); article.tags = article.tags.filter(x => x !== t); render(); refreshSidebar(); } }, '✕')])));
    const tagAddInput = el('input', { type: 'text', placeholder: '+ etiqueta', onkeydown: async (e) => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        const newTags = Array.from(new Set([...(article.tags || []), e.target.value.trim()]));
        await setArticleTags(article.id, newTags); article.tags = newTags; render(); refreshSidebar();
      }
    } });
    tagsRow.appendChild(tagAddInput);

    const metaRow = el('div', { class: 'btn-row', style: 'margin-bottom:14px' }, [
      el('span', { class: 'badge badge-accent' }, `${extractWikilinks(article.content).length} enlaces salientes`),
      el('span', { class: 'badge badge-accent2' }, `${backlinks.length} backlinks`),
      el('span', { class: 'badge' }, `Actualizado ${fmtDate(article.modifiedAt || article.createdAt)}`),
    ]);

    wrap.appendChild(metaRow);
    wrap.appendChild(tagsRow);

    if (state.editing) {
      const textarea = el('textarea', { id: 'edit-article-textarea', rows: 16, style: 'font-family:var(--font-mono);font-size:12.5px' }, article.content);
      wrap.appendChild(textarea);
    } else {
      const mdBody = el('div', {});
      wrap.appendChild(mdBody);
      renderMarkdownInto(mdBody, article.content);
    }

    if (backlinks.length) {
      wrap.appendChild(el('div', { class: 'section-title', style: 'font-size:13.5px;margin-top:22px' }, `← Enlazan hacia aquí (${backlinks.length})`));
      const blList = el('div', {});
      backlinks.forEach(b => blList.appendChild(el('span', { class: 'tag', style: 'cursor:pointer;margin:0 6px 6px 0;display:inline-block', onclick: () => openArticleModal(b) }, b.title)));
      wrap.appendChild(blList);
    }
    syncFooter();
  }

  function syncFooter() {
    const footer = [];
    if (state.editing) {
      footer.push(el('button', { class: 'btn btn-ghost', onclick: () => { state.editing = false; render(); } }, 'Cancelar'));
      footer.push(el('button', { class: 'btn btn-primary', onclick: async () => {
        const newContent = $('#edit-article-textarea').value;
        article.content = newContent; article.modifiedAt = Date.now(); article.embedding = null;
        await dbPut('articles', article);
        state.editing = false; render();
        toast('Artículo guardado.', 'success'); refreshSidebar();
      } }, 'Guardar cambios'));
    } else {
      footer.push(el('button', { class: 'btn btn-ghost btn-danger', onclick: async () => { await deleteArticle(article.id); closeModal(); toast('Artículo movido a la papelera.', 'info'); renderView(currentView); refreshSidebar(); } }, [el('span', { html: ICONS.trash }), 'Eliminar']));
      footer.push(el('button', { class: 'btn', onclick: () => { const link = buildShareLink(article); navigator.clipboard?.writeText(link); toast('Enlace de solo lectura copiado al portapapeles.', 'success'); } }, [el('span', { html: ICONS.link }), 'Compartir enlace']));
      footer.push(el('button', { class: 'btn', onclick: () => downloadText(`# ${article.title}\n\n${article.content}`, `${slugify(article.title)}.md`, 'text/markdown') }, [el('span', { html: ICONS.download }), 'Descargar .md']));
      footer.push(el('button', { class: 'btn btn-primary', onclick: () => { state.editing = true; render(); } }, [el('span', { html: ICONS.edit }), 'Editar']));
    }
    const footerEl = $('#modal-footer'); footerEl.innerHTML = ''; footer.forEach(f => footerEl.appendChild(f));
  }

  const titleWrap = el('span', { style: 'display:flex;align-items:center;gap:8px;cursor:pointer', title: 'Clic para renombrar', onclick: async () => {
    const newTitle = prompt('Nuevo título del artículo:', article.title);
    if (newTitle && newTitle.trim() && newTitle.trim() !== article.title) {
      await renameArticle(article.id, newTitle.trim());
      article.title = newTitle.trim();
      $('#modal-title').textContent = article.title;
      toast('Artículo renombrado (enlaces actualizados).', 'success');
      refreshSidebar();
    }
  } }, article.title);

  openModal('', wrap, []);
  $('#modal-title').innerHTML = '';
  $('#modal-title').appendChild(titleWrap);
